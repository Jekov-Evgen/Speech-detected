<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src http://127.0.0.1:8765; img-src 'self' data:">
  <title>SpeechDetect</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-glow"></div>

  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <span class="logo-text">SpeechDetect</span>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-tab="upload">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          <span>Загрузка</span>
        </button>
        <button class="nav-item" data-tab="history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>История</span>
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="server-status" id="serverStatus">
          <span class="status-dot offline"></span>
          <span class="status-text">Сервер...</span>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">

      <!-- TAB: Upload -->
      <section class="tab-content active" id="tabUpload">
        <header class="header">
          <div>
            <h1>Загрузка аудио</h1>
            <p class="subtitle">Загрузите голосовую запись для распознавания речи</p>
          </div>
        </header>

        <div class="content">
          <!-- Drop zone -->
          <div class="dropzone" id="dropzone">
            <div class="dropzone-inner">
              <div class="dropzone-icon">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <p class="dropzone-title">Перетащите аудиофайл сюда</p>
              <p class="dropzone-hint">или нажмите для выбора файла</p>
              <div class="dropzone-formats">WAV, MP3, OGG, FLAC, M4A</div>
              <input type="file" id="fileInput" accept=".wav,.mp3,.ogg,.flac,.m4a" hidden>
            </div>
          </div>

          <!-- File info card -->
          <div class="file-card hidden" id="fileCard">
            <div class="file-card-header">
              <div class="file-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 18V5l12-2v13"/>
                  <circle cx="6" cy="18" r="3"/>
                  <circle cx="18" cy="16" r="3"/>
                </svg>
              </div>
              <div class="file-info">
                <p class="file-name" id="fileName">—</p>
                <p class="file-meta" id="fileMeta">—</p>
              </div>
              <button class="btn-remove" id="btnRemove" title="Удалить">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"/>
                  <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
              </button>
            </div>

            <div class="waveform" id="waveform">
              <div class="waveform-bars" id="waveformBars"></div>
            </div>
          </div>

          <!-- Action buttons -->
          <div class="actions hidden" id="actions">
            <button class="btn-analyze" id="btnAnalyze">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
              <span>Распознать речь</span>
            </button>
          </div>

          <!-- Loading with progress -->
          <div class="loading hidden" id="loading">
            <div class="progress-container">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressBarFill"></div>
              </div>
              <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <p id="loadingText">Распознаём речь...</p>
          </div>

          <!-- Result card -->
          <div class="result-card hidden" id="resultCard">
            <div class="result-header">
              <span class="result-label">Результат распознавания</span>
            </div>
            <div class="result-text" id="resultText"></div>
            <div class="result-export">
              <button class="btn-export" id="btnExportPdf">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="12" y1="18" x2="12" y2="12"/>
                  <polyline points="9 15 12 18 15 15"/>
                </svg>
                <span>Сохранить PDF</span>
              </button>
              <button class="btn-export" id="btnExportDocx">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="12" y1="18" x2="12" y2="12"/>
                  <polyline points="9 15 12 18 15 15"/>
                </svg>
                <span>Сохранить Word</span>
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- TAB: History -->
      <section class="tab-content" id="tabHistory">
        <header class="header">
          <div>
            <h1>История</h1>
            <p class="subtitle">Все ваши загруженные и обработанные записи</p>
          </div>
        </header>

        <div class="content">
          <div class="history-list" id="historyList">
            <p class="empty-state" id="emptyHistory">Пока нет записей</p>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
